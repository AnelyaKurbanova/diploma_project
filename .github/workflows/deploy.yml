name: Build & Deploy

on:
  push:
    branches: ["dev", "main"]

jobs:
  env:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-env.outputs.tag }}
      remote_dir: ${{ steps.set-env.outputs.remote_dir }}
    steps:
      - name: Select environment
        id: set-env
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "remote_dir=/opt/app-staging" >> $GITHUB_OUTPUT
          else
            echo "tag=prod" >> $GITHUB_OUTPUT
            echo "remote_dir=/opt/app-prod" >> $GITHUB_OUTPUT
          fi

  build-backend:
    runs-on: ubuntu-latest
    needs: env
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "anelyakurbanova" --password-stdin

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/anelyakurbanova/diploma-backend:${{ needs.env.outputs.tag }} ./backend
          docker push ghcr.io/anelyakurbanova/diploma-backend:${{ needs.env.outputs.tag }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: env
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "anelyakurbanova" --password-stdin

      - name: Build and push frontend
        run: |
          docker build -t ghcr.io/anelyakurbanova/diploma-frontend:${{ needs.env.outputs.tag }} ./frontend
          docker push ghcr.io/anelyakurbanova/diploma-frontend:${{ needs.env.outputs.tag }}

  build-video-worker:
    runs-on: ubuntu-latest
    needs: env
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "anelyakurbanova" --password-stdin

      - name: Build and push video-worker
        run: |
          docker build -f video_worker/Dockerfile -t ghcr.io/anelyakurbanova/diploma-video-worker:${{ needs.env.outputs.tag }} .
          docker push ghcr.io/anelyakurbanova/diploma-video-worker:${{ needs.env.outputs.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: [env, build-backend, build-frontend, build-video-worker]
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "anelyakurbanova" --password-stdin
            cd ${{ needs.env.outputs.remote_dir }}
            docker compose down
            docker image prune -af
            docker compose pull
            docker compose up -d
